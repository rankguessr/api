name: Test and Publish new docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build and publish image
        run: |
          docker login --username rankguessr --password ${{ secrets.GH_PAT }} ghcr.io
          docker build -t ghcr.io/rankguessr/api:${{ github.sha }} -t ghcr.io/rankguessr/api:latest .
          docker push ghcr.io/rankguessr/api:${{ github.sha }}
          docker push ghcr.io/rankguessr/api:latest
